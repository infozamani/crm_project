{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block content %}
<h3 class="mb-3">{% if object %}ویرایش فرصت فروش{% else %}ثبت فرصت فروش جدید{% endif %}</h3>
<div class="card p-4" style="max-width:700px;">
    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-primary mt-2">ذخیره</button>
        <a href="{% url 'customers:opportunity_list' %}" class="btn btn-outline-secondary mt-2">انصراف</a>
    </form>
</div>
{% endblock %}
