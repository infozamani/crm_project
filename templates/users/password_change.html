{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}تغییر رمز عبور{% endblock %}
{% block content %}
<h3 class="mb-4">تغییر رمز عبور</h3>
<div class="card p-4" style="max-width:500px;">
    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-primary mt-2">تغییر رمز</button>
        <a href="{% url 'users:profile' %}" class="btn btn-outline-secondary mt-2">انصراف</a>
    </form>
</div>
{% endblock %}
