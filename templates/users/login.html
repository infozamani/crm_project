{% load crispy_forms_tags %}
{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ورود به سامانه CRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css">
    <style>body{font-family:Vazirmatn,Tahoma,sans-serif;background:#1e293b;}</style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">
    <div class="card p-4 shadow" style="width: 380px;">
        <h4 class="mb-3 text-center">🚜 ورود به سامانه CRM</h4>
        {% if form.errors %}
            <div class="alert alert-danger">نام کاربری یا رمز عبور اشتباه است.</div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-primary w-100 mt-3">ورود</button>
        </form>
    </div>
    <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
